<html>

<head>
    <style>
        body {
            background-color: rgb(197, 26, 54);
        }

        .fact-file {
            background-color: blue;
            width: 250px;
            padding: 25px;
            color: white;
            margin: 47px;
            border: 5px;
        }

        .animal-name {
            color: yellow;
            font-size: 25px;
        }

        .detail {
            color: rgb(169, 118, 218);
        }

        .cool-fact {
            color: black;
            font-style: italic;
        }
    </style>

</head>

<body>

    <div class="fact-file">
        <h2 class="animal-name">Snow Leopard</h2>
        <p class="detail">Type: Big Cat</p>
        <p class="detail">Lives in: Mountain ranges of Central Asia</p>
        <p class="detail">Diet: Deer, goats, and wild sheeps</p>
        <p class="cool-fact">Cool Fact: Can leap up to 15 metres in one jump!</p>
    </div>
</body>

</html>
