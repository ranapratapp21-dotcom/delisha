<html>
    <head>
        <title>My Hobby Cards</title>
        
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
            <style>
                body{
                    background-color: #f9f9f9;
                    font-family: Arial, sans-serif;
                    padding: 30px 15px;
                }
                h1{
                    text-align: center;
                    color: #FF5A43;
                }
                .hobby-card{
                    text-align: center;
                    border: 2px solid #FF5A43;
                    border-radius: 8px;
                    padding: 20px;
                    margin-bottom: 20px;
                    background-color: #fff9e1;
                }
            .hobby_card h3{
                color: #FF5A43;
            }
            </style>
    </head>

    <body>
        <h1>My Hobby Cards</h1>
        
        <div class="container">
            <div class="row">
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="hobby-card">
                        <h3>Drawing</h3>
                        <p>I love sketching animals and comice characters.</p>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="hobby-card">
                    <h3>Football</h3>
                    <p>I play football every evening with my friends.</p>
                
            
                </div>
            </div>
        <div class="col-12 col-md-6 col-lg-4">
            <div class="hobby-card">
                <h3>Reading</h3>
                <p>My favourite books are adventure stories.</p>
            </div>
        </div>
        </div>
    </body>
</html>
